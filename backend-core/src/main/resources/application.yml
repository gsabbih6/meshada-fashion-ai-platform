spring:
  web:
    resources:
      static-locations:
        - classpath:/META-INF/resources/
        - classpath:/resources/
        - classpath:/static/
        - classpath:/public/
        - file:${MESHADA_UGC_STATIC_LOCATION:/Users/gsabbih/IdeaProjects/meshada-fashion-platform/ugc-engine/python_scripts/}
  security:
    oauth2:
      client:
        registration:
          facebook:
            clientId: ${FACEBOOK_CLIENT_ID:}
            clientSecret: ${FACEBOOK_CLIENT_SECRET:}
            scope:
              - email
              - public_profile
          google:
            clientId: ${GOOGLE_CLIENT_ID:}
            clientSecret: ${GOOGLE_CLIENT_SECRET:}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:meshada_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:gsabbih}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092} # Fallback to local Kafka if needed, but it might fail later. Let's see.
  jpa:
    hibernate:
      ddl-auto: update
    format-sql: false
    show-sql: false
  session:
    jdbc:
      initialize-schema: always
  devtools:
    remote:
      restart:
        enabled: true
  application:
    name: meshada_api_entrypoint
