jwt:
  private:
    key: ${JWT_PRIVATE_KEY_PATH:classpath:rsa.private.key}
  public:
    key: ${JWT_PUBLIC_KEY_PATH:classpath:rsa.public.key}
meshada:
  ugc:
    scriptPath: ${MESHADA_UGC_SCRIPTPATH:/Users/gsabbih/IdeaProjects/meshada-fashion-platform/ugc-engine/python_scripts/orchestrator.py}
  social:
    instagram:
      businessAccountId: ${INSTAGRAM_BUSINESS_ACCOUNT_ID:}
      pageAccessToken: ${INSTAGRAM_PAGE_ACCESS_TOKEN:}
    twitter:
      apiKey: ${TWITTER_API_KEY:}
      apiSecret: ${TWITTER_API_SECRET:}
      accessToken: ${TWITTER_ACCESS_TOKEN:}
      accessTokenSecret: ${TWITTER_ACCESS_TOKEN_SECRET:}
      bearerToken: ${TWITTER_BEARER_TOKEN:}
    tiktok:
      clientKey: ${TIKTOK_CLIENT_KEY:}
      clientSecret: ${TIKTOK_CLIENT_SECRET:}
      accessToken: ${TIKTOK_ACCESS_TOKEN:}
    pinterest:
      accessToken: ${PINTEREST_ACCESS_TOKEN:}
      boardId: ${PINTEREST_BOARD_ID:}
  constants:
    kafka:
      signup_topic: SIGNED_UP
      rating_topic: RATING
      payment_topic: PAYMENTS
      cashback_topic: CASHBACK
      product_topic: PRODUCT
      interaction_topic: INTERACTIONS
      group_id: core-service-group-id
    cashback:
      percent: 0.6
    microservice:
      endpoint:
        core_service: ${CORE_SERVICE_URL:http://meshada-api-service.meshada-api.svc.cluster.local:8080}
        ai_service: ${AI_SERVICE_URL:http://meshada-ai-service-python:8000}
        recommender_service: ${RECOMMENDER_SERVICE_URL:http://meshada-ai-service.meshada-api.svc.cluster.local:8080}
    every.org:
      baser_url: www.every.org
  spark:
    enabled: ${MESHADA_SPARK_ENABLED:false}
    app:
      name: MeshadaSpark
    master: local[2]
  kafka:
    enabled: ${MESHADA_KAFKA_ENABLED:false}
  stripe:
    apiKey: ${STRIPE_API_KEY:}
    endpointSecret: ${STRIPE_ENDPOINT_SECRET:}
  pepper:
    apiKey: ${PEPPERJAM_API_KEY:}
  app:
    url: ${MESHADA_APP_URL:https://www.meshada.com}
    webapp: ${MESHADA_WEBAPP_URL:https://www.meshada.com}
